name: Build & Release Debug APK

on:
  push:
    tags:
      - 'v*'                 # 推送标签如 v1.0.0-debug 时自动触发
  workflow_dispatch:         # 允许在 GitHub 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Debug Release ${{ github.ref_name }}
          draft: false
          prerelease: true               # 标记为 Pre-release（测试版）
          generate_release_notes: true
          body: |
            此版本为 **Debug 构建**，适合测试使用。
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/debug/app-debug.apk
          asset_name: word-assistant-debug-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive